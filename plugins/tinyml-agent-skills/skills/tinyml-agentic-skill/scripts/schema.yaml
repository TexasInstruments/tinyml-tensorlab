presets:
  Generic_1024Input_FFTBIN_64Feature_8Frame:
    frame_size: 1024
    feature_size_per_frame: 64
    num_frame_concat: 8
    stacking: 2D1
    variables: 1
    feat_ext_transform: [FFT_FE, FFT_POS_HALF, DC_REMOVE, ABS, BINNING, LOG_DB, CONCAT]
    description: "FFT + binning to 64 bins across 8 frames. Good general-purpose preset for vibration and fault detection with 1024-sample frames."
    use_case: "General purpose"

  Generic_512Input_FFTBIN_32Feature_8Frame:
    frame_size: 512
    feature_size_per_frame: 32
    num_frame_concat: 8
    stacking: 2D1
    variables: 1
    feat_ext_transform: [FFT_FE, FFT_POS_HALF, DC_REMOVE, ABS, BINNING, LOG_DB, CONCAT]
    description: "FFT + binning to 32 bins across 8 frames. Smaller memory footprint than 1024-sample version."
    use_case: "Smaller input"

  Generic_256Input_FFTBIN_16Feature_8Frame:
    frame_size: 256
    feature_size_per_frame: 16
    num_frame_concat: 8
    stacking: 2D1
    variables: 1
    feat_ext_transform: [FFT_FE, FFT_POS_HALF, DC_REMOVE, ABS, BINNING, LOG_DB, CONCAT]
    description: "FFT + binning to 16 bins across 8 frames. Minimum memory footprint FFT preset."
    use_case: "Minimum memory footprint"

  Generic_1024Input_FFT_512Feature_1Frame:
    frame_size: 1024
    feature_size_per_frame: 512
    num_frame_concat: 1
    stacking: 2D1
    variables: 1
    feat_ext_transform: [FFT_FE, FFT_POS_HALF, ABS, DC_REMOVE, LOG_DB, CONCAT]
    description: "Full FFT spectrum (no binning), 512 features from a single 1024-sample frame. Higher resolution, larger model."
    use_case: "Full spectrum"

  Generic_512Input_FFT_256Feature_1Frame:
    frame_size: 512
    feature_size_per_frame: 256
    num_frame_concat: 1
    stacking: 2D1
    variables: 1
    feat_ext_transform: [FFT_FE, FFT_POS_HALF, ABS, DC_REMOVE, LOG_DB, CONCAT]
    description: "Full FFT spectrum (no binning), 256 features from a single 512-sample frame."
    use_case: "Full spectrum (smaller)"

  Generic_512Input_RAW_512Feature_1Frame:
    frame_size: 512
    feature_size_per_frame: 512
    num_frame_concat: 1
    stacking: 2D1
    variables: 1
    feat_ext_transform: [RAW_FE, CONCAT]
