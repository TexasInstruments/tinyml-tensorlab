transforms:
  FFT_FE:
    description: "Compute Fast Fourier Transform of the windowed signal."
    category: feature_extraction
    parameters: []

  FFT_POS_HALF:
    description: "Keep only the positive-frequency half of the FFT output (real signals are symmetric)."
    category: feature_extraction
    parameters: []

  FFT_Q15:
    description: "Fixed-point Q15 FFT for on-device MCU inference."
    category: feature_extraction_q15
    parameters: []

  WINDOWING:
    description: "Apply a windowing function (Hann/Hamming) before FFT to reduce spectral leakage."
    category: feature_extraction
    parameters: []

  ABS:
    description: "Take the absolute value (magnitude) of complex FFT output."
    category: feature_extraction
    parameters: []

  BINNING:
    description: "Group frequency bins to reduce feature count while preserving spectral shape."
    category: feature_extraction
    parameters: []

  BIN_Q15:
    description: "Q15 fixed-point binning with optional normalization."
    category: feature_extraction_q15
    parameters: []

  NORMALIZE:
    description: "Normalize features to zero mean and unit variance."
    category: feature_extraction
    parameters: []

  LOG_DB:
    description: "Convert magnitude spectrum to logarithmic (dB) scale, compressing dynamic range."
    category: feature_extraction
    parameters: []

  DC_REMOVE:
    description: "Remove the DC component (mean) from the signal."
    category: feature_extraction
    parameters: []

  CONCAT:
    description: "Concatenate features across multiple frames into the final feature vector."
    category: feature_extraction
    parameters: []

  RAW_FE:
    description: "Take the mean of the wave within each frame; optionally remove the DC component if dc_remove is True."
    category: feature_extraction
    parameters: []

  TO_Q15:
    description: "Convert floating-point to fixed-point Q15 format with saturation."
    category: feature_extraction_q15
    parameters: []

  Q15_SCALE:
    description: "Q15 bit-shift scaling (amplify or attenuate)."
    category: feature_extraction_q15
    parameters: []

  Q15_MAG:
    description: "Q15 magnitude of complex FFT output."
    category: feature_extraction_q15
    parameters: []

  PIR_FE:
    description: "Specialized feature extraction for PIR motion detection sensors."
    category: feature_extraction
    parameters: []

  ECG_NORMALIZE:
    description: "ECG-specific normalization."
    category: feature_extraction
    parameters: []

  PIR_FE_Q15:
    description: "Specialized Q15 fixed-point feature extraction for PIR motion detection sensors."
    category: feature_extraction_q15
    parameters: []

  ROUND_OFF:
    description: "Round-off transform to normalize and discretize signal values."
    category: feature_extraction
    parameters: []

  SimpleWindow:
    description: "Segment continuous time series into fixed-length overlapping windows using frame_size and stride_size."
    category: data_proc
    parameters:
      - name: frame_size
        type: int
        required: true
      - name: stride_size
        type: float
        required: false

  DownSample:
    description: "Decimate the signal to reduce sampling rate from sampling_rate to new_sr."
    category: data_proc
    parameters:
      - name: sampling_rate
        type: int
        required: true
      - name: new_sr
        type: int
        required: true

augmenters:
  AddNoise:
    file: add_noise.py
    description: "Adds random noise (Gaussian/Laplace/uniform) to training samples for robustness."

  Crop:
    file: crop.py
    description: "Randomly crop sub-sequences to increase dataset variety."

  Drift:
    file: drift.py
    description: "Add smooth cubic-spline baseline drift, simulating sensor drift."

  Dropout:
    file: dropout.py
    description: "Randomly zero-out time points, simulating missing data."

  TimeWarp:
    file: time_warp.py
    description: "Randomly warp the time axis (speeds up/slows down), useful for activity recognition."

  Pool:
    file: pool.py
    description: "Apply max/min/average pooling to reduce temporal resolution without changing output length."

  Quantize:
    file: quantize.py
    description: "Quantize signal to discrete levels using uniform/quantile/kmeans methods."

  Resize:
    file: resize.py
    description: "Resample the time series to a new length via linear interpolation."

  Reverse:
    file: reverse.py
    description: "Reverse the time axis of the sequence."

  Convolve:
    file: convolve.py
    description: "Apply convolution with a kernel."

  LinearTransform:
    file: linear_transform.py
    description: "Apply linear transformation to the data."

task_recommendations:
  generic_timeseries_forecasting:
    required_data_proc: [SimpleWindow]
    required_reason: "SimpleWindow is mandatory for forecasting — it creates the input window (frame_size samples) and the forecast horizon (future target values)."
    optional_data_proc: [DownSample]
    notes: "Set frame_size to the number of historical time steps the model looks back. Set forecast_horizon to the number of future steps to predict. Specify target_variables for which column(s) to forecast."

  motor_fault:
    required_data_proc: []
    optional_data_proc: [SimpleWindow, DownSample]
    recommended_presets:
      - Input256_FFTBIN_16Feature_8Frame_3InputChannel_removeDC_2D1
      - Input256_FFT_128Feature_1Frame_3InputChannel_removeDC_2D1
      - Input128_RAW_128Feature_1Frame_3InputChannel_removeDC_2D1
    preset_reason: "Motor fault data is typically high-frequency vibration from accelerometers. FFT-based presets capture fault-related frequency signatures."
    notes: "3-axis accelerometer data uses variables=3. For single-axis, use Generic_* presets."

  arc_fault:
    required_data_proc: []
    optional_data_proc: [DownSample]
    recommended_presets:
      - FFT1024Input_256Feature_1Frame_Full_Bandwidth
    preset_reason: "Arc fault detection relies on high-frequency content across the full bandwidth. Full-spectrum FFT captures arc signatures."
    notes: "Original sampling rate is typically 313 kHz, often downsampled to ~3130 Hz."

  pir_detection:
    required_data_proc: []
    optional_data_proc: []
    recommended_presets: [PIRDetection_125Input_25Feature_25Frame_1InputChannel_2D]
    preset_reason: "Specialized PIR feature extraction that captures motion patterns from passive infrared sensors."
    notes: "PIR sensors have a fixed sampling rate (~33 Hz) and specialized feature pipeline."

  ecg_classification:
    required_data_proc: [SimpleWindow]
    required_reason: "ECG data is a continuous time series that must be segmented into fixed-length windows for beat-level classification."
    optional_data_proc: [DownSample]
    recommended_presets: [ECG2500Input_Roundoff_1Frame]
    preset_reason: "ECG classification often benefits from raw waveform shape analysis rather than frequency decomposition."
    notes: "Typical ECG sampling rates are 250-500 Hz. Frame size should cover 1-2 heartbeat cycles."


stacking_modes:
  2D1:
    description: "Features are arranged in a 2D matrix with one row per channel. Preserves per-channel structure for convolutional models."
  1D:
    description: "Features from all channels are concatenated into a single flat sequence."
