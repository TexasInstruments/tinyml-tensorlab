
common:
    target_module: 'timeseries'
    task_type: 'generic_timeseries_classification'
    target_device: 'MSPM0G5187'
    run_name: '{date-time}/{model_name}'

dataset:
    # enable/disable dataset loading
    enable: True #False
    dataset_name: hand_gesture_dataset
    input_data_path: "https://software-dl.ti.com/C2000/esd/mcu_ai/01_04_00/datasets/hand_gesture_dataset.zip"
    split_type: "within_files"
    gof_test: True

data_processing_feature_extraction:
    feature_extraction_name: HandGesture256Input_RangeNormalize_1Frame
    # data_proc_transforms:
    # - SimpleWindow # 'SimpleWindow' must be specified for forecasting tasks
    # frame_size: 256
    # stride_size: 0.25
    # gof_test: false
    # feat_ext_transform: ['RANGE_NORMALIZE']


training:
    # enable/disable training
    enable: True #False
    model_name: CLS_55k_NPU
#    model_spec: ''
    batch_size: 30
    learning_rate: 0.001
    training_epochs: 40
    num_gpus: 0
    gof_test: True
    auto_quantization: False

testing:
    enable: True

compilation:
    # enable/disable compilation
    enable: True #False
